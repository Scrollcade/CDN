name: Generate Assets Index

on:
  push:
    branches:
      - main
    paths:
      - 'img/**'
      - 'audio/**'
      - 'generate-index.js'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate assets.json
        run: node generate-index.js
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets.json
          git status
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate assets.json" && git push)
